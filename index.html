<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRJ Creative — Internal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&display=swap');

  :root {
    --coral: #F48575;
    --blue: #2846ab;
    --purple: #8354c5;
    --muted: #8487ae;
    --cream: #dfd7ae;
    --dark: #1a1a2e;
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: rgba(255,255,255,0.08);
    --text: #f0eef8;
    --text-sub: #8487ae;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Ambient background blobs */
  body::before {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(131,84,197,0.12) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244,133,117,0.08) 0%, transparent 70%);
    bottom: -80px;
    left: -80px;
    pointer-events: none;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .top-stripe {
    height: 3px;
    background: linear-gradient(90deg, var(--coral), var(--blue), var(--purple));
    border-radius: 3px;
    margin-bottom: 36px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-mark {
    width: 40px;
    height: 40px;
    background: var(--coral);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
  }
  .logo-text .name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--text);
    font-weight: 500;
  }
  .logo-text .sub {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    letter-spacing: 0.15em;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus {
    border-color: var(--purple);
  }
  input[type="password"]::placeholder {
    letter-spacing: 0.05em;
    color: rgba(132,135,174,0.4);
  }

  .error {
    font-size: 12px;
    color: var(--coral);
    margin-top: 8px;
    display: none;
  }
  .error.visible { display: block; }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: rgba(132,135,174,0.5);
    margin-top: 28px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="top-stripe"></div>
  <div class="logo-row">
    <div class="logo-mark">M</div>
    <div class="logo-text">
      <div class="name">MIRJ Creative</div>
      <div class="sub">Internal Tools</div>
    </div>
  </div>
  <h1>Welcome back.</h1>
  <p class="subtitle">This is a private workspace. Enter your access code to continue.</p>

  <label for="password">Access code</label>
  <input type="password" id="password" placeholder="Enter your code" autocomplete="current-password" />
  <div class="error" id="error-msg">Incorrect code. Try again.</div>
  <button class="login-btn" onclick="login()">Enter workspace</button>

  <div class="footer-note">
    MIRJ Creative internal use only.<br>
    Not for client distribution.
  </div>
</div>

<script>
  // Enter password on Enter key
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  function login() {
    const input = document.getElementById('password').value;
    const error = document.getElementById('error-msg');
    // Password stored as simple hash for GitHub Pages
    // Current password: MIRJflow2025
    const correct = 'MIRJflow2025';
    if (input === correct) {
      sessionStorage.setItem('mirj_auth', 'true');
      window.location.href = 'dashboard.html';
    } else {
      error.classList.add('visible');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }
</script>
</body>
</html>
